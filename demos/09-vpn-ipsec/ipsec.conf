# strongSwan ipsec.conf — site-to-site VPN between two datacenters.
# Reviewed for "harvest now, decrypt later" exposure on long-lived tunnels.
conn dc-east-to-dc-west
    keyexchange=ikev2
    # IKE: AES-256 / SHA-384 / ECP-384 (Diffie-Hellman group 20)
    ike=aes256-sha384-ecp384
    # ESP: AES-256-GCM with classic MODP-2048 DH for PFS rekeys
    esp=aes256gcm16-modp2048
    leftauth=pubkey
    leftcert=dc-east-ecdsa.pem      # ECDSA P-384 identity cert
    rightauth=pubkey
    rightcert=dc-west-rsa.pem       # RSA peer identity
    auto=start
