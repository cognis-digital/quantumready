# Production TLS termination for api.example.com
# Exported from the edge reverse-proxy config under review.
server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/nginx/certs/api.crt;
    ssl_certificate_key /etc/nginx/certs/api.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    # Classical-only cipher suites — no PQC key exchange negotiated.
    ssl_ciphers TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256:TLS_RSA_WITH_AES_256_GCM_SHA384;
    ssl_ecdh_curve prime256v1:secp384r1;

    ssl_dhparam /etc/nginx/dhparam.pem;  # ffdhe2048 group
}
