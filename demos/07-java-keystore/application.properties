# Spring Boot service — crypto-relevant properties (application.properties).
# Pulled for a PQC exposure review of the JVM service tier.

server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=service

# JWT signing for inter-service tokens.
security.jwt.algorithm=ES256
security.jwt.curve=P-256

# mTLS client certificate uses an RSA (PKCS1) key pair.
client.cert.key-algorithm=RSA_PKCS1
client.cert.key-size=2048

# Server SSL key-exchange suite (classical RSA key transport).
server.ssl.ciphers=TLS_RSA_WITH_AES_256_GCM_SHA384

# Outbound webhook signing.
webhook.signature.algorithm=RS256
