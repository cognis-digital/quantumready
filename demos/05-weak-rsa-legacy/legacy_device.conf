# Firmware crypto config for a legacy field device (IoT gateway, EOL hardware).
# Found during an asset inventory of OT/embedded gear.

[tls]
# Undersized RSA — weak even against a classical adversary today.
key_algo = RSA
key_size = 1024
cert_signature = sha1WithRSAEncryption

[vpn]
# Legacy DSA host identity.
host_key = dsa

[update_channel]
# Firmware update images signed with rsa-1024.
firmware_sign = rsa_1024
