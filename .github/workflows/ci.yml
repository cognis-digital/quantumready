name: ci

# Build + test the Python package and all three language ports on every push/PR.
# Everything runs offline against committed fixtures/demos — no external host is
# ever contacted (passive/offline tool; tests only touch local files).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q

  go:
    name: go port (go test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v ./...

  rust:
    name: rust port (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test

  node:
    name: node/ts port (node --test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dev deps
        run: npm install --no-save typescript@^5.4.0 @types/node
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Test
        run: node --test
